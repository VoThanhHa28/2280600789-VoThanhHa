stages:
  - deploy

pages:
  stage: deploy
  script:
    - mkdir public
    - cp -r Buoi7/* public/
    - echo "Deploying to GitLab Pages..."
    - echo "Pipeline executed at: $(date)"
  artifacts:
    paths:
      - public
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
